server {
    listen 80;
    server_name artifact.jordanaallred.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name artifact.jordanaallred.com;

    ssl_certificate /etc/letsencrypt/live/artifact.jordanaallred.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artifact.jordanaallred.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — bulk AI operations (smart tags) can take 60-90s
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Buffers — large JSON responses (100+ facts × 10 tags)
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;

        # SSE / streaming support — pass chunks through without buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }
}
