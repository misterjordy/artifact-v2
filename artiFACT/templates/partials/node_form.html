<div x-data="{ open: true }"
     x-show="open" x-transition.opacity
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
     @keydown.escape.window="open = false; $el.parentElement.innerHTML = ''">
  <div class="bg-[var(--color-bg)] rounded-lg shadow-xl w-full max-w-md mx-4 p-6"
       @click.outside="open = false; document.getElementById('modal').innerHTML = ''">
    <h3 class="text-lg font-semibold text-[var(--color-text)] mb-1">Add Node</h3>
    {% if parent_title %}
    <p class="text-xs text-[var(--color-text-muted)] mb-4">Parent: {{ parent_title }}</p>
    {% endif %}

    {% if error %}
    <div class="mb-3 px-3 py-2 text-sm rounded bg-red-100 text-red-800 border border-red-200">{{ error }}</div>
    {% endif %}

    <form hx-post="/partials/node-form" hx-target="#modal" hx-swap="innerHTML">
      <input type="hidden" name="parent_node_uid" value="{{ parent_node_uid }}">

      <div class="mb-4">
        <label for="node-title" class="block text-sm font-medium text-[var(--color-text)] mb-1">Title</label>
        <input id="node-title" type="text" name="title" required minlength="1" maxlength="255"
               value="{{ title_value }}"
               class="w-full px-3 py-2 text-sm border border-[var(--color-border)] rounded-md bg-[var(--color-bg)] text-[var(--color-text)] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
               placeholder="Enter node title"
               autofocus>
      </div>

      <div class="flex justify-end gap-2">
        <button type="button"
                @click="open = false; document.getElementById('modal').innerHTML = ''"
                class="px-4 py-2 text-sm rounded-md text-[var(--color-text-muted)] hover:bg-[var(--color-bg-hover)] transition-colors">
          Cancel
        </button>
        <button type="submit"
                class="px-4 py-2 text-sm rounded-md bg-[var(--color-accent)] text-[var(--color-text-on-accent)] hover:opacity-90 transition-opacity">
          Create Node
        </button>
      </div>
    </form>
  </div>
</div>
