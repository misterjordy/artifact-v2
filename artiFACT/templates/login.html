{% extends "base.html" %}

{% block title %}artiFACT — Sign In{% endblock %}

{% block head %}
<script src="/static/js/login.js" defer></script>
{% endblock %}

{% block body %}
<div class="flex min-h-full items-center justify-center px-4 bg-[var(--color-bg)]">
  <div class="w-full max-w-sm">
    <!-- Logo / title -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold tracking-tight text-slate-800">artiFACT</h1>
      <p class="mt-1 text-sm text-[var(--color-text-muted)]">Program management system</p>
    </div>

    <!-- Card -->
    <div class="rounded-lg border border-[var(--color-border)] bg-[var(--color-bg-card)] p-6 shadow-sm">
      <!-- Error banner -->
      <div id="login-error"
           class="hidden mb-4 rounded-md bg-red-50 border border-red-200 px-3 py-2 text-sm text-[var(--color-danger)]">
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required
                 class="block w-full rounded-md border border-[var(--color-border-input)] bg-[var(--color-bg-input)]
                        px-3 py-2 text-sm text-slate-900 placeholder-slate-400
                        focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)] focus:border-transparent">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required
                 class="block w-full rounded-md border border-[var(--color-border-input)] bg-[var(--color-bg-input)]
                        px-3 py-2 text-sm text-slate-900 placeholder-slate-400
                        focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)] focus:border-transparent">
        </div>
        <button id="login-submit" type="submit"
                class="w-full rounded-md bg-[var(--color-accent)] px-4 py-2 text-sm font-semibold text-white
                       hover:bg-[var(--color-accent-hover)] focus:outline-none focus:ring-2 focus:ring-offset-2
                       focus:ring-[var(--color-accent)] disabled:opacity-50 disabled:cursor-not-allowed
                       transition-colors">
          Sign in
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs text-[var(--color-text-muted)]">
      DoD authorized use only
    </p>
  </div>
</div>
{% endblock %}
