{% extends "base.html" %}

{% block title %}artiFACT — Browse{% endblock %}

{% block head %}
<script src="/static/js/browse.js" defer></script>
{% endblock %}

{% block body %}
<div class="flex h-full">
  <!-- Sidebar -->
  <aside class="flex flex-col w-[var(--sidebar-width)] flex-shrink-0 bg-[var(--color-bg-sidebar)] text-[var(--color-text-sidebar)]">
    <!-- Sidebar header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
      <span class="text-sm font-bold tracking-wide text-white">artiFACT</span>
    </div>

    <!-- Sidebar section label -->
    <div class="px-4 pt-4 pb-2">
      <span class="text-[11px] font-semibold uppercase tracking-wider text-[var(--color-text-sidebar-heading)]">
        Taxonomy
      </span>
    </div>

    <!-- Tree container -->
    <div id="tree-container"
         class="flex-1 overflow-y-auto px-2 pb-4 sidebar-scroll"
         hx-get="/partials/tree" hx-trigger="load" hx-swap="innerHTML">
      <div class="px-2 py-8 text-center text-xs text-slate-500">Loading tree&hellip;</div>
    </div>

    <!-- Sidebar footer -->
    <div class="border-t border-white/10 px-4 py-3">
      <div class="flex items-center justify-between">
        <span class="text-xs text-[var(--color-text-sidebar-heading)] truncate">{{ user.display_name }}</span>
        <a id="logout-link" href="#"
           class="text-xs text-[var(--color-text-sidebar-heading)] hover:text-white transition-colors">
          Sign out
        </a>
      </div>
    </div>
  </aside>

  <!-- Main content area -->
  <div class="flex flex-col flex-1 min-w-0">
    <!-- Top bar -->
    <header class="flex items-center justify-between px-6 py-3 border-b border-[var(--color-border)] bg-[var(--color-bg-topbar)]">
      <h1 class="text-sm font-semibold text-slate-800">Browse</h1>
    </header>

    <!-- Center pane -->
    <main id="center-pane" class="flex-1 overflow-y-auto p-6">
      <div class="flex items-center justify-center h-full">
        <p class="text-sm text-[var(--color-text-muted)]">Select a node from the tree to get started.</p>
      </div>
    </main>
  </div>
</div>
{% endblock %}
