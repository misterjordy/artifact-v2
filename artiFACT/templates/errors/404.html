{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block body %}
<div class="flex items-center justify-center min-h-screen bg-[var(--color-bg)]">
  <div class="max-w-md w-full px-6 py-12 text-center">
    <h1 class="text-6xl font-bold text-[var(--color-accent)] mb-4">404</h1>
    <h2 class="text-xl font-semibold text-slate-800 mb-2">Page Not Found</h2>
    <p class="text-slate-600 mb-8">The page you are looking for does not exist or has been moved.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/browse"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-[var(--color-accent)] rounded-md hover:opacity-90 transition-opacity">
        Go to Browse
      </a>
      <a href="/"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-medium text-slate-700 bg-slate-100 rounded-md hover:bg-slate-200 transition-colors">
        Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
