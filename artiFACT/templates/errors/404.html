{% extends "base.html" %}
{% block title %}404 | Page Not Found{% endblock %}
{% block body %}
<div class="flex items-center justify-center min-h-screen bg-[var(--color-bg)]">
  <div class="max-w-md w-full px-6 py-12 text-center">
    <h1 class="text-6xl font-bold text-[var(--color-accent)] mb-4">404</h1>
    <h2 class="text-xl font-semibold text-[var(--color-text)] mb-2">Page Not Found</h2>
    <p class="text-[var(--color-text-muted)] mb-8">The page you are looking for does not exist or has been moved.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/browse"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-medium text-[var(--color-text-on-accent)] bg-[var(--color-accent)] rounded-md hover:opacity-90 transition-opacity">
        Go to Browse
      </a>
      <a href="/"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-medium text-[var(--color-text)] bg-[var(--color-bg)] rounded-md hover:opacity-80 transition-colors border border-[var(--color-border)]">
        Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
