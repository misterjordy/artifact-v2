{% extends "base.html" %}
{% block title %}AI Chat — artiFACT{% endblock %}
{% block body %}
<div class="min-h-full flex flex-col" x-data="chatApp()">
  <!-- Header -->
  <header class="border-b px-6 py-3 flex items-center justify-between bg-white">
    <div class="flex items-center gap-4">
      <h1 class="text-lg font-semibold">AI Chat</h1>
      <select x-model="selectedNode" @change="loadContext()" class="border rounded px-2 py-1 text-sm">
        <option value="">All topics</option>
        <template x-for="p in programs" :key="p.node_uid">
          <optgroup :label="p.title">
            <option :value="p.node_uid" x-text="p.title"></option>
            <template x-for="t in (topics[p.node_uid] || [])" :key="t.node_uid">
              <option :value="t.node_uid" x-text="'  ' + t.title"></option>
            </template>
          </optgroup>
        </template>
      </select>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs text-gray-400" x-show="factsLoaded > 0"
            x-text="factsLoaded + '/' + factsTotal + ' facts loaded'"></span>
      <a href="/settings" class="text-sm text-accent hover:underline">Settings</a>
      <a href="/browse" class="text-sm text-gray-500 hover:underline">Browse</a>
    </div>
  </header>

  <!-- Chat messages -->
  <main class="flex-1 overflow-y-auto p-6 space-y-4" id="chat-messages">
    <template x-for="(msg, i) in messages" :key="i">
      <div :class="msg.role === 'user'
        ? 'ml-auto bg-accent text-white rounded-lg px-4 py-2 max-w-[70%]'
        : 'mr-auto bg-gray-100 rounded-lg px-4 py-2 max-w-[70%]'">
        <div class="text-sm whitespace-pre-wrap" x-text="msg.content"></div>
      </div>
    </template>
    <div x-show="streaming" class="mr-auto bg-gray-100 rounded-lg px-4 py-2 max-w-[70%]">
      <div class="text-sm whitespace-pre-wrap" x-text="streamBuffer || '...'"></div>
    </div>
    <div x-show="errorMsg" class="text-sm text-red-600 bg-red-50 rounded p-3" x-text="errorMsg"></div>
  </main>

  <!-- Input -->
  <footer class="border-t px-6 py-4 bg-white">
    <form @submit.prevent="sendMessage()" class="flex gap-3">
      <input
        type="text"
        x-model="input"
        placeholder="Ask about the corpus..."
        class="flex-1 border rounded-lg px-4 py-2 text-sm"
        :disabled="streaming"
        x-ref="chatInput"
      >
      <button
        type="submit"
        class="bg-accent text-white px-6 py-2 rounded-lg text-sm hover:bg-accent-hover disabled:opacity-50"
        :disabled="!input.trim() || streaming"
      >Send</button>
    </form>
  </footer>
</div>

<script defer>
function chatApp() {
  const csrfToken = document.cookie.split('; ')
    .find(c => c.startsWith('csrf_token='))?.split('=')[1] || '';
  return {
    messages: [],
    input: '',
    streaming: false,
    streamBuffer: '',
    errorMsg: '',
    selectedNode: '',
    programs: [],
    topics: {},
    factsLoaded: 0,
    factsTotal: 0,
    async init() {
      await this.loadContext();
      this.$refs.chatInput?.focus();
    },
    async loadContext() {
      const r = await fetch('/api/v1/ai/context', { credentials: 'same-origin' });
      if (r.ok) {
        const data = await r.json();
        this.programs = data.programs;
        this.topics = data.topics;
      }
    },
    async sendMessage() {
      const msg = this.input.trim();
      if (!msg) return;
      this.errorMsg = '';
      this.messages.push({ role: 'user', content: msg });
      this.input = '';
      this.streaming = true;
      this.streamBuffer = '';

      const history = this.messages.slice(0, -1).slice(-20).map(m => ({
        role: m.role, content: m.content
      }));

      const body = { message: msg, history: history };
      if (this.selectedNode) body.node_uid = this.selectedNode;

      try {
        const r = await fetch('/api/v1/ai/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken },
          credentials: 'same-origin',
          body: JSON.stringify(body),
        });

        if (!r.ok) {
          const d = await r.json();
          this.errorMsg = d.detail || 'Chat request failed';
          this.streaming = false;
          return;
        }

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6);
            if (payload === '[DONE]') break;
            try {
              const evt = JSON.parse(payload);
              if (evt.type === 'meta') {
                this.factsLoaded = evt.data.facts_loaded;
                this.factsTotal = evt.data.facts_total;
              } else if (evt.type === 'chunk') {
                this.streamBuffer += evt.data;
              } else if (evt.type === 'replace') {
                this.streamBuffer = evt.data;
              }
            } catch {}
          }
          this.scrollToBottom();
        }

        this.messages.push({ role: 'assistant', content: this.streamBuffer });
      } catch (e) {
        this.errorMsg = 'Network error — check your connection.';
      }
      this.streaming = false;
      this.streamBuffer = '';
      this.scrollToBottom();
    },
    scrollToBottom() {
      this.$nextTick(() => {
        const el = document.getElementById('chat-messages');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },
  };
}
</script>
{% endblock %}
