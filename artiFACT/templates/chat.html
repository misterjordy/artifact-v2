{% extends "base.html" %}

{% block title %}AI Chat — artiFACT{% endblock %}

{% block head %}
<script src="/static/js/chat.js" defer></script>
{% endblock %}

{% block page_heading %}AI Chat{% endblock %}

{% block header_actions %}
<div class="flex items-center gap-3" x-data="{ programs: [], topics: {}, selectedNode: '' }">
  <span class="text-xs text-[var(--color-text-muted)]" id="chat-facts-status"></span>
</div>
{% endblock %}

{% block main_class %}p-0 flex flex-col{% endblock %}

{% block content %}
<div class="flex flex-col flex-1 min-h-0" x-data="chatApp()">
  <!-- Topic selector bar -->
  <div class="px-6 py-2 border-b border-[var(--color-border)] bg-[var(--color-bg-card)] flex items-center gap-3">
    <label class="text-xs font-medium text-[var(--color-text-muted)]">Topic:</label>
    <select x-model="selectedNode" @change="loadContext()" class="border border-[var(--color-border-input)] rounded px-2 py-1 text-sm bg-[var(--color-bg-input)]">
      <option value="">All topics</option>
      <template x-for="p in programs" :key="p.node_uid">
        <optgroup :label="p.title">
          <option :value="p.node_uid" x-text="p.title"></option>
          <template x-for="t in (topics[p.node_uid] || [])" :key="t.node_uid">
            <option :value="t.node_uid" x-text="'  ' + t.title"></option>
          </template>
        </optgroup>
      </template>
    </select>
    <span class="text-xs text-[var(--color-text-muted)]" x-show="factsLoaded > 0"
          x-text="factsLoaded + '/' + factsTotal + ' facts loaded'"></span>
  </div>

  <!-- Chat messages -->
  <div class="flex-1 overflow-y-auto p-6 space-y-4" id="chat-messages">
    <template x-for="(msg, i) in messages" :key="i">
      <div :class="msg.role === 'user'
        ? 'ml-auto bg-[var(--color-accent)] text-white rounded-lg px-4 py-2 max-w-[70%]'
        : 'mr-auto bg-[var(--color-bg-card)] border border-[var(--color-border)] rounded-lg px-4 py-2 max-w-[70%]'">
        <div class="text-sm whitespace-pre-wrap" x-text="msg.content"></div>
      </div>
    </template>
    <div x-show="streaming" class="mr-auto bg-[var(--color-bg-card)] border border-[var(--color-border)] rounded-lg px-4 py-2 max-w-[70%]">
      <div class="text-sm whitespace-pre-wrap" x-text="streamBuffer || '...'"></div>
    </div>
    <div x-show="errorMsg" class="text-sm text-[var(--color-danger)] bg-red-50 border border-red-200 rounded p-3" x-text="errorMsg"></div>
  </div>

  <!-- Input -->
  <div class="border-t border-[var(--color-border)] px-6 py-4 bg-[var(--color-bg-card)]">
    <form @submit.prevent="sendMessage()" class="flex gap-3">
      <input
        type="text"
        x-model="input"
        placeholder="Ask about the corpus..."
        class="flex-1 border border-[var(--color-border-input)] rounded-lg px-4 py-2 text-sm bg-[var(--color-bg-input)] focus:outline-none focus:ring-2 focus:ring-[var(--color-accent)]"
        :disabled="streaming"
        x-ref="chatInput"
      >
      <button
        type="submit"
        class="bg-[var(--color-accent)] text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-[var(--color-accent-hover)] disabled:opacity-50 transition-colors"
        :disabled="!input.trim() || streaming"
      >Send</button>
    </form>
  </div>
</div>
{% endblock %}
